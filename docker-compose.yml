version: "3"

services:
  n8n:
    image: n8nio/n8n
    container_name: clara-n8n
    ports:
      - "5678:5678"
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./dataset:/data
      - ./outputs:/outputs
      - ./scripts:/scripts
    environment:
      - N8N_ENABLE_EXECUTIONS_PROCESS=true
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
    restart: always